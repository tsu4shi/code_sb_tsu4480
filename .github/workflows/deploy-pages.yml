name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Sync Google OAuth client ID for kakeibo login
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: node tools/kakeibo/syncAuthConfig.js

      - name: Build static site (Parcel demo + kakeibo + receipts)
        # All entries are client-side (no backend). Receipt OCR calls Google
        # Vision from the browser with a user-provided API key. The base path
        # matches this repo's GitHub Pages project URL.
        run: npx parcel build index.html kakeibo.html receipts.html --out-dir dist --public-url /${{ github.event.repository.name }}/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
